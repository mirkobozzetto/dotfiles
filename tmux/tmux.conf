set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on

# killing the attached session detached the client, which killed the tmux
# process Ghostty runs, which closed the window. Switch to another session instead.
set -g detach-on-destroy off
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:RGB,xterm-256color:RGB"

# without this tmux swallows extended keys (Ctrl+Shift+letter) before Neovim
# without this tmux blocks the graphics protocol: no image gets through
set -g allow-passthrough on

set -s extended-keys on
set -as terminal-features "xterm-ghostty:extkeys,alacritty:extkeys,xterm-256color:extkeys"
set -as terminal-features "xterm-ghostty:RGB"

# -N: the note is what "prefix + Space" displays. Without it, list-keys -N
# skips the bind and the shortcut stays invisible in the help.
bind -N "Split pane right" | split-window -h -c "#{pane_current_path}"
bind -N "Split pane down" - split-window -v -c "#{pane_current_path}"
bind -N "New window in current directory" c new-window -c "#{pane_current_path}"
bind -N "Select pane left" h select-pane -L
bind -N "Select pane down" j select-pane -D
bind -N "Select pane up" k select-pane -U
bind -N "Select pane right" l select-pane -R

# Option+h/j/k/l crosses Neovim splits and tmux panes with one set of keys.
# When the focused pane runs Neovim the key is forwarded to it; vim-tmux-navigator
# inside Neovim calls back into tmux once the cursor is already at the edge.
# Not Ctrl+h/j/k/l, the usual choice: tmux would swallow them at the root level
# and the shell would lose Ctrl+L (clear), Ctrl+K (kill line) and Ctrl+H.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"
bind -T copy-mode-vi M-h select-pane -L
bind -T copy-mode-vi M-j select-pane -D
bind -T copy-mode-vi M-k select-pane -U
bind -T copy-mode-vi M-l select-pane -R
bind -N "Kill pane" x kill-pane
bind -N "Kill window" X kill-window
bind -N "Resize pane left (repeatable)" -r H resize-pane -L 5
bind -N "Resize pane down (repeatable)" -r J resize-pane -D 3
bind -N "Resize pane up (repeatable)" -r K resize-pane -U 3
bind -N "Resize pane right (repeatable)" -r L resize-pane -R 5
# middle click on a tab in the bottom bar: it closes
bind -n MouseDown2Status kill-window

bind -N "Open project, fuzzy find (Cmd+P)" f run-shell -b "tmux popup -E -w 70% -h 60% ~/.config/tmux/sessionizer.sh"
# -N -N starts with the big preview (tmux 3.5+); -F carries #[] styles since 2.9.
# Sessions mauve, windows green, running command grey, attached/detached spelled out.
# -N -N opens with the big preview (tmux 3.5+); -F takes #[] styles since 2.9.
# Commas inside #[] must be escaped as #, or tmux splits the conditional on them.
# -O time sorts by activity: sessions have no manual order in tmux (no
# swap-session exists), so recency is the only way to float one to the top.
bind -N "Switch session (Cmd+P)" s choose-tree -Zs -N -N -O time \
  -K "#[fg=#6c7086](#{line})" -F \
  "#{?pane_format,\
#[fg=#7f849c]#{pane_current_command}  #[fg=#f9e2af]#{pane_title},\
#{?window_format,\
#[fg=#a6e3a1#,bold]#{window_name}#[fg=#7f849c]#{window_flags}  \
#[fg=#6c7086]#{?#{==:#{window_panes}#,1},#{pane_current_command},#{window_panes} panes},\
#[fg=#cba6f7#,bold]#{session_windows} windows  \
#{?session_attached,#[fg=#89b4fa]attached,#[fg=#6c7086]detached}}}"
bind -N "Open project, fuzzy find (Cmd+Shift+P)" o run-shell -b "~/.config/tmux/sesh-picker.sh"
bind -N "Reload config" r source-file ~/.config/tmux/tmux.conf \; display "reloaded"
# ( and ) already cycle sessions; this is the Alt+Tab reflex: back to the one
# you just came from, then back again.
bind -N "Back to last session" BSpace switch-client -l

# overrides the default "next-layout": never used here, and Space is the
# most reachable key right after the prefix
bind -N "Show this keybinding list" Space display-popup -w 70% -h 70% -E \
  "tmux list-keys -N -T prefix | sort -f | less -R --prompt='tmux keys - / to search, q to quit'"

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# every mouse selection (drag, double-click, triple-click) ends in
# copy-pipe-and-cancel with no argument: without copy-command it lands in
# the tmux buffer only, never in the macOS clipboard.
set -g copy-command "pbcopy"

bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# one line per notch instead of three: the default scroll jumps too much
bind -T copy-mode-vi WheelUpPane send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 1 scroll-down
bind -n WheelUpPane if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send -M" "copy-mode -e ; send -X -N 1 scroll-up"
bind -n WheelDownPane if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send -M" "send -M"

# the tab name follows the folder, not the shell
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

# belt and suspenders: even launched without a login shell, plugins need
# to find tmux and gitmux (/opt/homebrew/bin missing from macOS apps' PATH)
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
# prefix+Tab: fuzzy-pick any path, URL, hash or word already on screen, then
# copy it or type it into the prompt. Replaces reaching for the mouse.
set -g @plugin 'laktak/extrakto'
# prefix+F: scan the current pane's output for file paths, pick one with fzf,
# open it as a new tab in the nvim running elsewhere in the session - the pane
# you are on (Claude Code, a shell) is never touched. Handles path:line:col.
set -g @plugin 'Peter-McKinney/tmux-fzf-open-files-nvim'
# prefix+O: same idea as the plugin's prefix+H, but the list is filtered to files
# that actually exist on disk, so the stale fragments H surfaces are gone. Cmd+O
# in Ghostty sends this. prefix+o stays the sesh picker, prefix+p stays
# previous-window; the plugin's own F/H/G stay bound and untouched.
bind -N "Open a real file from this pane in nvim" O run-shell -b "~/.config/tmux/open-real-file-nvim.sh"
set -g @extrakto_key 'Tab'
set -g @extrakto_split_direction 'p'
set -g @extrakto_popup_size '80%,60%'
# hook-based agent sidebar: accurate Claude Code state (working/done/blocked)
# plus what each agent is doing — prompts, tool calls, subagent trees, worktrees.
# prefix+e toggles this window's sidebar, prefix+E every window. Cmd+Shift+B = prefix+e.
# don't spawn the sidebar on every new window; open it on demand with Cmd+Shift+B
# 15% of a 150-col terminal is 22 columns: too narrow to read the row
# metadata, which is why everything looked collapsed. 42 fits it all.
set -g @sidebar_width 42
set -g @sidebar_auto_create off
# no macOS notifications; the panel already shows everything
set -g @sidebar_notifications off
set -g @plugin 'hiroppy/tmux-agent-sidebar'
# jump to the next agent that needs you (waiting/permission/blocked), cycling
bind -N "Jump to next agent needing you" g run-shell -b "~/.config/tmux/agent-jump-next.sh"
# keep the sidebar list in sync with the panes actually running claude
run-shell -b "~/.config/tmux/agent-registry-sync.sh"
# switch to an agent as soon as it needs you, once your pane goes quiet
run-shell -b "~/.config/tmux/agent-auto-jump.sh"
# completes the jump Vibe Island only half performs: it brings Ghostty forward
# and logs the tmux pane it meant to reach, but ships no switch-client
run-shell -b "~/.config/tmux/vibe-island-jump-bridge.sh"
# all three refuse to start a second copy of themselves, so attaching is a
# free chance to notice one has died and bring it back.
set-hook -g client-attached "run-shell -b '~/.config/tmux/agent-registry-sync.sh' ; run-shell -b '~/.config/tmux/agent-auto-jump.sh' ; run-shell -b '~/.config/tmux/vibe-island-jump-bridge.sh'"

# added to the default list, not replacing it. "~" matches anywhere in the command
# line instead of anchoring at its start: claude is saved with its full flags,
# including --resume <id>, so a bare "claude" would never match and the session id
# is what brings the conversation back. The cc/ccc aliases are resolved by the shell
# before tmux ever sees them.
set -g @resurrect-processes 'lazygit "~claude"'

# survives a restart: the session tree lives in RAM, these plugins write it to disk
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# ---- status bar ----
# Ghostty announces the macOS appearance through mode 2031; tmux turns that into
# these two hooks. Each theme file sets the palette then sources the shared
# layout, so the bar follows the system without a poller.
set-hook -g client-dark-theme "run-shell -b '~/.config/tmux/theme-apply.sh'"
set-hook -g client-light-theme "run-shell -b '~/.config/tmux/theme-apply.sh'"
# whatever the appearance is at launch, before any change is announced
run-shell -b "~/.config/tmux/theme-apply.sh"

# TPM last: it loads the plugins the bar just referenced
run '~/.config/tmux/plugins/tpm/tpm'
