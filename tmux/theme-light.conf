# Catppuccin Latte. INK is the colour written on top of the coloured blocks: on
# a light palette the roles invert, the pale value becomes the background and
# the saturated one the block.
%hidden BASE="#eff1f5"
%hidden SURFACE="#ccd0da"
%hidden TEXT="#4c4f69"
%hidden MUTED="#8c8fa1"
%hidden GREEN="#40a02b"
%hidden PINK="#ea76cb"
%hidden BLUE="#1e66f5"
%hidden INK="#dce0e8"

source-file ~/.config/tmux/theme.conf
