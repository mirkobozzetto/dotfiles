# Flexoki Light. Its accents are the 600 range, which is what the palette
# prescribes for text on a light background. INK is the colour written on top of
# the coloured blocks: on a light palette the roles invert, the paper value
# becomes the ink and the saturated one the block.
%hidden BASE="#fffcf0"
%hidden SURFACE="#dad8ce"
%hidden TEXT="#100f0f"
%hidden MUTED="#6f6e69"
%hidden GREEN="#66800b"
%hidden PINK="#a02f6f"
%hidden BLUE="#205ea6"
%hidden INK="#fffcf0"

source-file ~/.config/tmux/theme.conf
