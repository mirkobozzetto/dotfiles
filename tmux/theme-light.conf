# Quiet Light, same palette as the Neovim theme. INK is the colour written on
# top of the coloured blocks: on a light palette the roles invert, the paper
# value becomes the ink and the saturated one the block.
%hidden BASE="#f5f5f5"
%hidden SURFACE="#e6e6e6"
%hidden TEXT="#444963"
%hidden MUTED="#777777"
%hidden GREEN="#448c27"
%hidden PINK="#7a3e9d"
%hidden BLUE="#4b83cd"
%hidden INK="#f5f5f5"

source-file ~/.config/tmux/theme.conf
