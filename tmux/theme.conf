# Status bar layout, palette-independent. theme-dark.conf and theme-light.conf
# each define the eight colours below, then source this file.
#
# Written by hand: the catppuccin/tmux theme forces its rounded ends even in
# "custom" style, and its modules glue segments together with no readable margin.
# Whole words instead of icons, two spaces between blocks.

set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 140
set -g status-style "bg=default,fg=${TEXT}"

set -g status-left "#[fg=${INK},bg=${GREEN},bold]  #S  #[default]   "

setw -g window-status-format "#[fg=${MUTED},bg=${SURFACE}]  #I  #W  #[default]"
setw -g window-status-current-format "#[fg=${INK},bg=${PINK},bold]  #I  #W  #[default]"
setw -g window-status-separator "   "

set -g status-right "#[fg=${MUTED}]#(gitmux -cfg $HOME/.gitmux.conf '#{pane_current_path}')"
set -ag status-right "   #(~/.config/tmux/agent-status-segment.sh)"
set -ag status-right "   #[fg=${MUTED}]#{battery_percentage}"
set -ag status-right "   #[fg=${INK},bg=${BLUE},bold]  %H:%M  #[default]"

set -g pane-border-style "fg=${SURFACE}"
set -g pane-active-border-style "fg=${BLUE}"
set -g message-style "bg=${BLUE},fg=${INK}"

# selected line in choose-tree and copy mode: yellow on black by default
set -g mode-style "bg=${SURFACE},fg=${PINK},bold"

# right-click menus and copy-mode search hits ship with raw yellow/cyan/magenta
set -g menu-style "bg=${BASE},fg=${TEXT}"
set -g menu-selected-style "bg=${SURFACE},fg=${PINK},bold"
set -g menu-border-style "fg=${BLUE}"
set -g menu-border-lines rounded
set -g copy-mode-match-style "bg=${SURFACE},fg=${PINK}"
set -g copy-mode-current-match-style "bg=${PINK},fg=${INK},bold"
