tmux:
  symbols:
    branch: " "
    hashprefix: ":"
    ahead: "↑·"
    behind: "↓·"
    staged: "● "
    conflict: "✖ "
    modified: "✚ "
    untracked: "… "
    stashed: "⚑ "
    clean: "✔"
    insertions: "+"
    deletions: "-"
  styles:
    clear: "#[fg=#cdd6f4]"
    state: "#[fg=#f38ba8,bold]"
    branch: "#[fg=#cdd6f4,bold]"
    remote: "#[fg=#94e2d5]"
    divergence: "#[fg=#7f849c]"
    staged: "#[fg=#a6e3a1]"
    conflict: "#[fg=#f38ba8,bold]"
    modified: "#[fg=#f9e2af]"
    untracked: "#[fg=#cba6f7]"
    stashed: "#[fg=#89b4fa]"
    clean: "#[fg=#7f849c]"
    insertions: "#[fg=#a6e3a1]"
    deletions: "#[fg=#f38ba8]"
  layout: [branch, divergence, " ", flags]
  options:
    branch_max_len: 18
    branch_trim: right
    ellipsis: …
